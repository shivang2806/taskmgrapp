<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{common/layout}">
<head>
    <title>Customer List</title>
</head>
<body>
<div layout:fragment="content">
    <div class="chart-card">
        <div class="chart-header">
            <h3 class="chart-title">Customer List</h3>
            <div class="d-flex gap-2">
                <a th:href="@{/customers/export}"
                   class="chart-btn btn btn-success"
                   id="exportBtn"
                   onclick="handleExport(this)">
                    <i class="bi bi-file-earmark-excel me-1"></i> Export Excel
                </a>
                <a th:href="@{/create-customer}" class="chart-btn">Create Customer</a>
            </div>
        </div>
        <div class="table-responsive">
            <table class="table activity-table">
                <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Name</th>
                    <th scope="col">Email</th>
                    <th scope="col">Mobile</th>
                    <th scope="col">Status</th>
                    <th scope="col">Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="customer, customerStat : ${customers}">
                    <th scope="row" th:text="${customerStat.count}"></th>
                    <td>
                        <a th:href="@{/customer-profile/{id}(id=${customer.id})}">
                            <span th:text="${customer.name}"></span>
                        </a>
                    </td>
                    <td th:text="${customer.email}"></td>
                    <td th:text="${customer.mobile}"></td>
                    <td th:text="${customer.status}"></td>
                    <td>
                        <a><i class="bi bi-eye"></i></a>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- Pagination -->
            <nav aria-label="Customer pagination">
                <ul class="pagination justify-content-end">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/customer-list(page=${currentPage - 1})}">Previous</a>
                    </li>
                    <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        class="page-item"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link"
                           th:text="${i + 1}"
                           th:href="@{/customer-list(page=${i})}"></a>
                    </li>
                    <li class="page-item"
                        th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
                        <a class="page-link"
                           th:href="@{/customer-list(page=${currentPage + 1})}">Next</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<script th:fragment="scripts">
    function handleExport(btn) {
        const original = btn.innerHTML;
        btn.innerHTML = '<i class="bi bi-hourglass-split me-1"></i> Exporting...';
        btn.classList.add('disabled');
        // Re-enable after 5s in case download completes or fails
        setTimeout(() => {
            btn.innerHTML = original;
            btn.classList.remove('disabled');
        }, 5000);
    }
</script>
</body>
</html>
